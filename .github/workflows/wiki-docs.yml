name: Wiki Documentation

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  update-wiki:
    name: Update Wiki
    runs-on: ubuntu-latest
    # Only run when the Release workflow succeeded (i.e. a real tag was created).
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout modules repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0   # needed for git describe to find the tag

      - name: Get release tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Generate docs — modules/s3
        uses: terraform-docs/gh-actions@v1.3.0
        with:
          working-dir: modules/s3
          output-file: s3-module-docs.md
          output-method: replace
          git-push: false

      - name: Push docs to GitHub Wiki
        run: |
          # Clone the wiki repo (separate git repo at <repo>.wiki.git)
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

          # Copy generated docs into the wiki
          cp modules/s3/s3-module-docs.md    wiki-repo/Module-S3.md

          # Write an index page
          cat > wiki-repo/Home.md <<'EOF'
          # Terraform Modules Documentation

          Auto-generated from source. Last updated: ${{ steps.tag.outputs.name }}

          ## Available Modules

          - [[Module-S3]] — Reusable S3 bucket with versioning, encryption, and public access block

          ## Usage

          Reference modules in your Terraform configuration using a pinned version tag:

          ```hcl
          module "core" {
            source = "git::https://github.com/${{ github.repository }}.git//modules/s3?ref=${{ steps.tag.outputs.name }}"
          }
          ```
          EOF

          # Commit and push
          cd wiki-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: update module documentation for ${{ steps.tag.outputs.name }}"
          git push
